<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HI Chahat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffe6eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        /* --- BACKGROUND DECORATIONS --- */
        .bg-dino {
            position: absolute;
            font-size: 80px;
            top: 10%;
            left: 10%;
            opacity: 0.25;
            z-index: 1;
            user-select: none;
        }

        .bg-f1-left {
            position: absolute;
            font-size: 60px;
            top: 40%;
            left: 5%;
            opacity: 0.3;
            z-index: 1;
            user-select: none;
            transform: scaleX(-1);
        }

        .bg-f1-right {
            position: absolute;
            font-size: 60px;
            top: 30%;
            right: 5%;
            opacity: 0.3;
            z-index: 1;
            user-select: none;
        }

        /* Moving Dogs at the bottom sliding side to side */
        .dog-container {
            position: absolute;
            bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
            z-index: 1;
            user-select: none;
        }

        .sliding-dog {
            font-size: 45px;
            animation: slide 3.5s ease-in-out infinite alternate;
        }

        .dog2 { animation-delay: 0.8s; }
        .dog3 { animation-delay: 1.6s; }

        @keyframes slide {
            0% { transform: translateX(-30px); }
            100% { transform: translateX(30px); }
        }

        /* --- CARD STYLING --- */
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 420px;
            width: 100%;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff4d6d;
            font-size: 26px;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        p {
            color: #4a4a4a;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .primary-btn {
            background-color: #ff4d6d;
            color: white;
        }

        .primary-btn:active {
            transform: scale(0.95);
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        /* Runaway Button Setup Fix */
        #no-btn {
            background-color: #f0f0f0;
            color: #555;
            position: absolute;
            transition: all 0.2s ease;
            z-index: 12;
            left: 55%; /* Spaced out horizontally from Yes */
        }

        #yes-btn {
            position: absolute;
            z-index: 5;
            left: 15%; /* Kept safely on the left side */
        }

        /* Captain America vs Iron Man Styles */
        #cap-btn {
            background-color: #0056b3;
            color: white;
            opacity: 1;
            transition: opacity 1.2s ease;
        }

        #iron-btn {
            background-color: #b30000;
            color: #ffcc00;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-dino">🦕</div>
    <div class="bg-f1-left">🏎️</div>
    <div class="bg-f1-right">🏎️</div>

    <div class="dog-container">
        <div class="sliding-dog dog1">🐕</div>
        <div class="sliding-dog dog2">🐶</div>
        <div class="sliding-dog dog3">🦮</div>
    </div>

    <!-- Main Card Container -->
    <div class="card">
        
        <!-- SCREEN 1: INTRO -->
        <div id="screen1">
            <span class="emoji">🎁</span>
            <h1>Hey, I made something for you...</h1>
            <p>Click below whenever you're ready!</p>
            <button class="primary-btn" onclick="nextScreen(1, 2)">Continue</button>
        </div>

        <!-- SCREEN 2: QUESTION 1 (Bhola) -->
        <div id="screen2" class="hidden">
            <span class="emoji">🥺</span>
            <h1>Is bhola mine??</h1>
            <div class="btn-container" style="height: 50px;">
                <button id="yes-btn" class="primary-btn" onclick="nextScreen(2, 3)">Yes</button>
                <button id="no-btn">No</button>
            </div>
        </div>

        <!-- SCREEN 3: QUESTION 2 (Marvel Fade) -->
        <div id="screen3" class="hidden">
            <span class="emoji">💥</span>
            <h1>Who's better?</h1>
            <div class="btn-container" style="height: 50px; position: static; display: flex; gap: 15px;">
                <button id="cap-btn" onclick="fadeCap()">Captain America</button>
                <button id="iron-btn" onclick="nextScreen(3, 4)">Iron Man</button>
            </div>
        </div>

        <!-- SCREEN 4: QUESTION 3 (Missed You) -->
        <div id="screen4" class="hidden">
            <span class="emoji">🤔</span>
            <h1>How much do you think I missed you?</h1>
            <div class="btn-container" style="height: 50px; position: static; display: flex; gap: 15px;">
                <button class="primary-btn" onclick="nextScreen(4, 'finale')">A lot</button>
                <button style="background-color: #f0f0f0; color: #555;" onclick="nextScreen(4, 'fakeout')">Very little</button>
            </div>
        </div>

        <!-- SCREEN 5: FAKEOUT WRONG ANSWER -->
        <div id="screen5" class="hidden">
            <span class="emoji">👀</span>
            <h1>Correct!</h1>
            <p id="fakeout-text" style="margin-top: 15px; font-weight: bold; color: #ff4d6d; min-height: 40px;"></p>
        </div>

        <!-- SCREEN 6: ULTIMATE FINALE -->
        <div id="screen6" class="hidden">
            <span class="emoji">🥰💖👑</span>
            <h1 style="margin-bottom: 15px;">I love you and I rly missed you</h1>
            <p style="color: #ff4d6d; font-weight: bold; font-size: 22px; margin-bottom: 0;">I'm glad you're back! Let's hang out soon!!</p>
        </div>
    </div>

    <script>
        function nextScreen(current, next) {
            if (next === 'fakeout') {
                document.getElementById('screen4').classList.add('hidden');
                document.getElementById('screen5').classList.remove('hidden');
                
                const textElement = document.getElementById('fakeout-text');
                textElement.innerText = "";
                
                setTimeout(() => {
                    textElement.innerText = "Just kidding. This was the wrong answer. Try again! 😂";
                }, 800);

                setTimeout(() => {
                    document.getElementById('screen5').classList.add('hidden');
                    document.getElementById('screen4').classList.remove('hidden');
                }, 3500);
                return;
            }

            document.getElementById('screen' + current).classList.add('hidden');
            
            if (next === 'finale') {
                document.getElementById('screen6').classList.remove('hidden');
            } else {
                document.getElementById('screen' + next).classList.remove('hidden');
                if (next === 2) {
                    setupNoButton();
                }
            }
        }

        function fadeCap() {
            const capBtn = document.getElementById('cap-btn');
            capBtn.style.opacity = '0';
            setTimeout(() => {
                capBtn.style.pointerEvents = 'none';
            }, 600);
        }

        function setupNoButton() {
            const noBtn = document.getElementById('no-btn');
            const yesBtn = document.getElementById('yes-btn');
            
            // Fixed initial screen layouts to give plenty of room
            yesBtn.style.left = '15%';
            noBtn.style.left = '55%';

            function moveButton() {
                const card = document.querySelector('.card');
                const padding = 40;
                
                const maxX = card.clientWidth - noBtn.clientWidth - padding;
                const maxY = card.clientHeight - noBtn.clientHeight - padding;
                
                const randomX = Math.floor(Math.random() * maxX) - (card.clientWidth / 4);
                const randomY = Math.floor(Math.random() * maxY) - (card.clientHeight / 3);

                noBtn.style.left = randomX + 'px';
                noBtn.style.top = randomY + 'px';
            }

            noBtn.addEventListener('mouseenter', moveButton);
            noBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                moveButton();
            });
        }
    </script>
</body>
</html>
